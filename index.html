<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPI Data Security System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-blue-500 to-cyan-400 min-h-screen flex items-center justify-center p-4">

    <div id="loginSection" class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all duration-500">
        <div class="bg-indigo-700 p-8 text-center relative">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <svg width="100%" height="100%"><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.5"/></pattern><rect width="100%" height="100%" fill="url(#grid)" /></svg>
            </div>
            <div class="mx-auto bg-white/20 w-20 h-20 rounded-2xl flex items-center justify-center mb-4 backdrop-blur-md rotate-3 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">JESSADA 2 HOSPITAL</h2>
            <p class="text-indigo-100 text-sm mt-2 opacity-90">SMART OR LOGIN</p>
        </div>

        <div class="p-8 lg:p-10">
            <form id="loginForm" onsubmit="validateLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                            </svg>
                        </span>
                        <input type="text" id="username" class="w-full pl-10 pr-4 py-3 border-2 border-gray-100 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all" placeholder="ระบุชื่อผู้ใช้" required>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                            </svg>
                        </span>
                        <input type="password" id="password" class="w-full pl-10 pr-4 py-3 border-2 border-gray-100 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-xl shadow-indigo-200 transition transform hover:-translate-y-1 active:scale-95 duration-200">
                    ตกลงเข้าสู่ระบบ IOT
                </button>
            </form>
        </div>
    </div>

    <div id="menuSection" class="hidden w-full max-w-2xl transform transition-all duration-700 scale-95 opacity-0">
        <div class="bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden p-8 border border-white/20">
            <div class="flex items-center justify-between mb-8 border-b pb-4">
                <div>
                    <h2 class="text-2xl font-bold text-indigo-900">DASHBOARD ENV BY IOT</h2>
                    <p class="text-gray-500">ยินดีต้อนรับ: รพ.เจษฎา 2</p>
                </div>
                <button onclick="location.reload()" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-semibold hover:bg-red-100 transition-colors">ออกจากระบบ</button>
            </div>

            <div class="grid grid-cols-1 gap-4">
                
               </a>
                <a href="https://script.google.com/macros/s/AKfycbznVj5UZZ552pwdPnyLws_0lMHUEq27-UFK6Oq1aLRGavzjSYB19phjuyeoXMyI79jG/exec" target="_blank"
                   class="group flex items-center p-4 bg-blue-50 rounded-2xl border-2 border-blue-100 hover:border-blue-500 hover:bg-blue-100 transition-all duration-300">
                    <div class="bg-blue-500 p-3 rounded-xl text-white mr-4 shadow-lg group-hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-blue-900 text-lg">Smart OR Jessada 2 Hospital Monitor</h3>
                        <p class="text-blue-700/70 text-sm">DASHBOARD ENV BY IOT</p>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ml-auto text-blue-400 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>

                </a>

            </div>
        </div>
    </div>

    <script>
        function validateLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'OR' && pass === 'ENV') {
                Swal.fire({
                    icon: 'success',
                    title: 'ยืนยันตัวตนสำเร็จ',
                    text: 'ยินดีต้อนรับเข้าสู่ระบบ SMART ENV BY IOT',
                    timer: 2000,
                    timerProgressBar: true,
                    showConfirmButton: false,
                    background: '#fff',
                    iconColor: '#4F46E5',
                }).then(() => {
                    showMenu();
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'การเข้าถึงถูกปฏิเสธ',
                    text: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง โปรดลองอีกครั้ง',
                    confirmButtonColor: '#4F46E5',
                    confirmButtonText: 'ตกลง'
                });
            }
        }

        function showMenu() {
            const loginSec = document.getElementById('loginSection');
            const menuSec = document.getElementById('menuSection');

            loginSec.classList.add('scale-90', 'opacity-0');
            setTimeout(() => {
                loginSec.classList.add('hidden');
                menuSec.classList.remove('hidden');
                setTimeout(() => {
                    menuSec.classList.remove('scale-95', 'opacity-0');
                    menuSec.classList.add('scale-100', 'opacity-100');
                }, 50);
            }, 500);
        }
    </script>
</body>
</html>
